name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: examcraft
          POSTGRES_PASSWORD: examcraft
          POSTGRES_DB: examcraft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U examcraft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # tiktoken (dùng để ước tính token trong app/embed_knowledge.py) tự tải file BPE
      # từ blob Azure lúc gọi lần đầu trong tiến trình — runner ephemeral nên không có
      # sẵn, mỗi lần chạy đều tải lại và có thể dính lỗi mạng thoáng qua (503 "server is
      # busy", đã gặp thật). Cố định TIKTOKEN_CACHE_DIR (mặc định tiktoken dùng thư mục
      # tmp ngẫu nhiên, không cache lại được) rồi cache theo đường dẫn đó để hầu hết lần
      # chạy không cần gọi mạng nữa; app/embed_knowledge.py cũng đã tự retry cho lần
      # cache-miss đầu.
      - name: Set tiktoken cache dir
        run: echo "TIKTOKEN_CACHE_DIR=$HOME/.cache/tiktoken" >> "$GITHUB_ENV"

      - name: Cache tiktoken encoding files
        uses: actions/cache@v4
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k_base

      - name: Create test database
        run: PGPASSWORD=examcraft psql -h localhost -U examcraft -d examcraft -c "CREATE DATABASE examcraft_test;"

      - name: Run backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+psycopg://examcraft:examcraft@localhost:5432/examcraft_test
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build
