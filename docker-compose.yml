services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-examcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examcraft}
      POSTGRES_DB: ${POSTGRES_DB:-examcraft}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examcraft}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-examcraft}:${POSTGRES_PASSWORD:-examcraft}@db:5432/${POSTGRES_DB:-examcraft}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:5173"]'
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@examcraft.dev}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:3000"

volumes:
  db_data:
